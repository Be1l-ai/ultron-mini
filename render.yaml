services:
  - type: web
    name: nanobot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: BRAIN_URL
        sync: false        # set manually in Render dashboard
      - key: BRAIN_SECRET
        sync: false        # must match HF_API_SECRET in your HF Space
      - key: NANOBOT_SECRET
        sync: false        # your own key to protect the nanobot API
      - key: MAX_STEPS
        value: "10"
